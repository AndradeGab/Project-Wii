<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wii Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/webp" href="favicon/1935.png">

</head>

<body>
    <audio id="bgm" loop>
        <source src="audio/bgm.mp3" type="audio/mpeg">
    </audio>
    <div id="start-screen">

        <h1>Wii Portfolio</h1>

        <p>Aponte o WiiMote pra tela e aperte <img id="botaoControle" src="imagens/a.png" alt=""> (apenas clique!) para começar</p>
        <p>Aperte <b>BARRA DE ESPAÇO</b> para alternar entre o modo escuro e o modo claro</p>
        

    </div>
    <div class="apresentacao">
    <h1>Meus Projetos Abaixo</h1>
    <div class="console">
        <div class="wiiscreen" id="wiiscreen">

            <div class="channels" id="channels">

            </div>

            </div>

            <div class="wii-footer">
                <div class="wii-button left">
                    Wii
                </div>
                <div class="footer-channel-name"></div>
                <div class="footer-center">
                    <div id="hora"></div>
                    <div id="data"></div>
                </div>

                <div class="wii-button right">
                    ✉
                </div>

            </div>
            <div id="channel-tooltip"></div>
        </div>


</div>
    </div>

    <div id="cursor">
        <img src="cursor/cursor.png" id="cursor-img">
    </div>

    <div id="transicao"></div>

    <script src="script.js"></script>
</body>

</html>
